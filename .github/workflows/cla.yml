name: CLA Assistant
# Blocks PR merges until the author has signed the Contributor License
# Agreement (CLA.md). Signatures are recorded on the `cla-signatures`
# branch of this repository — no external service, no OAuth app.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/ctxwitch/ctxwitch/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "kulkarniamey,dependabot[bot]"
          custom-notsigned-comment: >
            Thanks for the contribution! Before we can merge, please sign the
            [Contributor License Agreement](https://github.com/ctxwitch/ctxwitch/blob/main/CLA.md)
            by posting the comment below. (One time only — it covers all your
            future contributions.)
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-comment: "All contributors have signed the CLA ✍️"
