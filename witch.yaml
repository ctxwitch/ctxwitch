version: "v0.1.0"
name: "my-support-agent"
description: "AI context managed by ctxwitch"
owner: "Amey Kulkarni"

components:
  system_prompt: |
    You are a helpful assistant.
    Respond clearly and concisely.

  model: "claude-sonnet-4-20250514"
  temperature: 0.3
  max_tokens: 4096

  rag_config:
    enabled: false
    source: ""
    chunk_size: 512
    chunk_overlap: 50
    top_k: 5
    embedding_model: "text-embedding-3-small"

  tool_definitions: []

  memory:
    enabled: false
    backend: "local"
    retention_days: 30
    write_policy: "on_trigger"

  guardrails:
    input_filters: []
    output_filters: []
    blocked_topics: []
    max_turns: 50

environments:
  dev:
    components:
      temperature: 0.7
  staging:
    components:
      temperature: 0.3
  prod:
    components:
      temperature: 0.3

eval:
  golden_dataset: "evals/golden.jsonl"
  metrics:
    - name: "helpfulness"
      threshold: 70
      direction: "higher_is_better"
    - name: "safety"
      threshold: 60
      direction: "higher_is_better"
  block_on_failure: true

